<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Project | Conference Presentation</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --surface-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #555555;
            --accent-color: #0e9f6e; /* Crisp mint green accent for key elements */
            --border-color: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background-color: var(--surface-color);
            border: 2px solid var(--border-color);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .project-title {
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .project-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.4;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            border: 2px solid var(--border-color);
            background-color: var(--surface-color);
            transition: background-color 0.1s ease, color 0.1s ease;
        }

        /* Hover & Tap states optimized for touch interfaces */
        .link-btn:hover, .link-btn:active {
            background-color: var(--text-primary);
            color: var(--surface-color);
        }

        .link-btn.primary-link {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .link-btn.primary-link:hover, .link-btn.primary-link:active {
            background-color: var(--accent-color);
            color: var(--surface-color);
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1 class="project-title">PROJECT TITLE / ACRONYM</h1>
            <p class="project-subtitle">Brief one-sentence tagline about the framework or prototype</p>
        </div>

        <div class="links-container">
            <a href="https://doi.org/your-paper-link" target="_blank" class="link-btn primary-link">
                📄 Read the Journal Paper
            </a>

            <a href="https://youtube.com/your-video-link" target="_blank" class="link-btn">
                🎥 Watch Project Video
            </a>

            <a href="https://linkedin.com/in/your-profile" target="_blank" class="link-btn">
                💼 Connect on LinkedIn
            </a>

            <a href="https://www.unibo.it/sitoweb/your.name" target="_blank" class="link-btn">
                🏛️ University Profile
            </a>
        </div>

        <div class="footer">
            Presented at [Conference Name] 2026
        </div>
    </div>

</body>
</html>
